inputs:
  - type: stdin

pipeline:
  filters:
    - level: error
  transforms:
    - add_fields:
        env: production
  dedup:
    enabled: true
    window: 5s
  sampling:
    rate: 0.5
  batch:
    size: 100
    interval: 2s
  alerts:
    - name: high_error_rate
      level: error
      threshold: 10
      window: 60s
    - name: oom_detected
      contains: "out of memory"
      threshold: 1
      window: 30s

outputs:
  - type: stdout
    format: json
  - type: file
    path: /var/log/logpipe/out.log
    format: plain
