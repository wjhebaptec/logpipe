inputs:
  - type: stdin

  - type: file
    path: /var/log/app.log

outputs:
  - name: stdout
    type: stdout
    format: json

  - name: errors_file
    type: file
    path: /var/log/errors.log
    format: json
    filters:
      level: error

  - name: warnings_file
    type: file
    path: /var/log/warnings.log
    format: plain
    filters:
      level: warn
      contains: "timeout"

health:
  enabled: true
  address: ":8080"
