# logpipe example configuration

inputs:
  - id: app_logs
    type: file
    path: /var/log/app/app.log
    format: json

  - id: syslog
    type: file
    path: /var/log/syslog
    format: plain

outputs:
  - id: errors_file
    type: file
    path: /var/log/logpipe/errors.log
    format: json
    filters:
      level: error

  - id: stdout_all
    type: stdout
    format: plain

transform:
  add_fields:
    host: my-server
    pipeline: logpipe
  remove_fields:
    - debug_info
  upper_level: true

labels:
  prefix: lp
  static:
    env: production
    region: us-east-1
  copy_from:
    service_label: svc

filters:
  - level: error
    contains: "timeout"

health:
  address: ":9090"

metrics:
  enabled: true

dedup:
  window: 5s

rate_limit:
  rate: 1000
  burst: 100

batch:
  size: 50
  interval: 2s

sampling:
  rate: 0.5

alert:
  rules:
    - level: error
      threshold: 10
      window: 60s
      webhook: https://hooks.example.com/alert

retry:
  max_attempts: 3
  initial_delay: 500ms
  max_delay: 5s
