inputs:
  - type: stdin

outputs:
  - name: stdout
    type: stdout
    format: json
    filters:
      level: info

  - name: errors_file
    type: file
    path: /var/log/errors.log
    format: json
    filters:
      level: error
      contains: "exception"

transform:
  add_fields:
    env: production
  remove_fields:
    - debug_id
  rename_fields:
    msg: message
  upper_level: true

throttle:
  max_per_window: 200
  window: 10s
  match_level: error

alerts:
  - level: error
    threshold: 10
    window: 60s
    message: "High error rate detected"

health:
  address: ":9090"
