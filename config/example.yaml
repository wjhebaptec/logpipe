inputs:
  - name: app-logs
    type: file
    path: /var/log/app.log
    checkpoint: /var/run/logpipe/app.checkpoint.json

  - name: syslog
    type: file
    path: /var/log/syslog
    checkpoint: /var/run/logpipe/syslog.checkpoint.json

outputs:
  - name: stdout
    type: stdout
    format: json

  - name: errors-file
    type: file
    path: /var/log/logpipe/errors.log
    format: plain
    filters:
      level: error

transforms:
  - add_fields:
      env: production
      host: "${HOSTNAME}"
  - remove_fields:
      - debug_trace

redact:
  - field: message
    pattern: '\b\d{4}-\d{4}-\d{4}-\d{4}\b'
    replacement: "[REDACTED-CC]"
  - field: password
    replacement: "***"

sampling:
  rate: 0.5
  level: debug

batch:
  size: 100
  interval: 5s

health:
  address: ":9090"

alerts:
  - name: high-error-rate
    level: error
    threshold: 10
    window: 60s
    webhook: https://hooks.example.com/alert
