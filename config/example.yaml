# logpipe example configuration

inputs:
  - id: app_logs
    type: stdin
    format: json

  - id: syslog
    type: file
    path: /var/log/syslog
    format: plain

filters:
  level: error
  contains: ""
  fields: {}

transform:
  add_fields:
    env: production
  remove_fields: []
  rename_fields: {}
  uppercase_level: true

dedup:
  enabled: true
  window: 10s

sampling:
  rate: 1.0

rate_limit:
  rate: 500
  burst: 50

throttle:
  max: 200
  window: 1m

batch:
  size: 50
  interval: 5s

redact:
  rules:
    - field: password
      replace: "[REDACTED]"
    - field: token
      pattern: '[A-Za-z0-9+/=]{20,}'
      replace: "[TOKEN]"

schema:
  rules:
    - field: message
      required: true
    - field: level
      required: true
      pattern: '^(DEBUG|INFO|WARN|ERROR|FATAL)$'

alerts:
  - name: high_error_rate
    level: error
    threshold: 10
    window: 1m
    webhook: https://hooks.example.com/alert

aggregate:
  group_by: service
  window: 30s
  max_groups: 100

outputs:
  - id: file_out
    type: file
    path: /var/log/logpipe/out.log
    format: json
    filters:
      level: error

  - id: stdout_out
    type: stdout
    format: plain

health:
  address: ":9090"

checkpoint:
  path: /var/lib/logpipe/checkpoint.json
