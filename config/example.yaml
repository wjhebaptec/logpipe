# logpipe example configuration

inputs:
  - name: app-file
    type: file
    path: /var/log/myapp/app.log

  - name: syslog-tcp
    type: tcp
    addr: "0.0.0.0:5140"

filters:
  - name: errors-only
    field: level
    match: "error"
    labels:
      severity: high

  - name: service-api
    field: service
    match: "api-gateway"

outputs:
  - name: local-stdout
    type: stdout
    format: json

  - name: error-file
    type: file
    target: /var/log/logpipe/errors.log
    format: json

  - name: remote-collector
    type: http
    target: "https://logs.example.com/ingest"
    format: json
